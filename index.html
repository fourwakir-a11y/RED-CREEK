<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Creek</title>

    <link rel="stylesheet" href="style.css">

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>

    <!-- MAIN MENU -->
    <div id="menu">
        <h1>RED CREEK</h1>
        <p>Open World FPS RPG</p>

        <button id="startBtn">
            Start Game
        </button>
    </div>

    <!-- HUD -->
    <div id="hud">

        <div id="crosshair">
            +
        </div>

        <div id="ammo">
            Ammo: 30 / 30
        </div>

        <div id="objective">
            Explore Red Creek
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
